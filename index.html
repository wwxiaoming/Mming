<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="#home" class="nav__logo">
        <span class="nav__logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="7" width="18" height="13" rx="2"/>
            <path d="M8 7V6a4 4 0 0 1 8 0v1"/>
            <line x1="12" y1="11" x2="12" y2="14"/>
          </svg>
        </span>
        <span class="nav__logo-text">BelleSac</span>
      </a>
      <div class="nav__links">
        <a href="#home" class="nav__link">首页</a>
        <a href="#cart" class="nav__cart" title="购物车">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="nav__cart-badge" id="cart-badge">0</span>

      </div>
    </nav>

  <main id="app" class="main"></main>

  <div id="toast" class="toast"></div>

  <footer class="footer">
    <p class="footer__text">&copy; 2026 BelleSac. All rights reserved.</p>
  </footer>

  <script src="js/data.js"></script>

</html>
