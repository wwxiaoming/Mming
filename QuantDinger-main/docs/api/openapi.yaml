        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Remove a symbol from watchlist for the current user.
      description: 'The watchlist table has ``UNIQUE(user_id, market, symbol)`` but
