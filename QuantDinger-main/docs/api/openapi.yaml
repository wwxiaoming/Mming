              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Place a quick market or limit order.
      description: "Body JSON:\ncredential_id  (int)    — saved exchange credential\
        \ ID\nsymbol         (str)    — e.g. \"BTC/USDT\"\nside           (str)  \
        \  — \"buy\" or \"sell\"\norder_type     (str)    — \"market\" or \"limit\"\
        \  (default: market)\namount         (float)  — USDT amount (always in USDT,\
        \ will be converted to base qty)\nprice          (float)  — limit price (required\
        \ for limit orders)\nleverage       (int)    — leverage multiplier (default:\
        \ 1)\n                          - leverage = 1: spot market\n            \
        \              - leverage > 1: swap (perpetual futures) market\nmarket_type\
        \    (str)    — \"swap\" / \"spot\" (optional, auto-determined by leverage\
