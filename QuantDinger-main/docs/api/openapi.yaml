info:
  description: 'Human-facing REST API for QuantDinger. Agent integrations use `/api/agent/v1`
    — see `docs/agent/agent-openapi.json`. Conventions: `docs/API_CONVENTIONS.md`.'
  contact:
    name: QuantDinger
    url: https://github.com/brokermr810/quantdinger
  license:
    name: See repository LICENSE
  x-api-app-version: 3.0.22
  title: QuantDinger Web API
  version: 1.0.0
components:
  securitySchemes:
    HumanJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'User session JWT from `POST /api/auth/login`. Send as `Authorization:
        Bearer <token>`.'
    AgentToken:
      type: http
      scheme: bearer
      bearerFormat: qd_agent_xxx
      description: Agent Gateway token for `/api/agent/v1/*` only. See docs/agent/AGENT_QUICKSTART.md.
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          description: Error code
        status:
          type: string
          description: Error name
        message:
          type: string
          description: Error message
        errors:
          type: object
          description: Errors
          additionalProperties: {}
      additionalProperties: false
    PaginationMetadata:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items.
        total_pages:
          type: integer
          description: Total number of pages.
        first_page:
          type: integer
          description: First available page number.
        last_page:
          type: integer
          description: Last available page number.
        page:
          type: integer
          description: Current page number.
        previous_page:
          type: integer
          description: Previous page number.
        next_page:
          type: integer
          description: Next page number.
      additionalProperties: false
    HumanSuccessEnvelope:
      type: object
      properties:
        code:
          type: integer
          description: 1 on success
          example: 1
        msg:
          type: string
          example: success
        data:
          nullable: true
      additionalProperties: false
    HumanErrorEnvelope:
      type: object
      properties:
        code:
          type: integer
          description: 0 on error
          example: 0
        msg:
          type: string
        data:
          nullable: true
      additionalProperties: false
    AgentSuccessEnvelope:
      type: object
      properties:
        code:
          type: integer
          description: 0 on success
          example: 0
        message:
          type: string
        data:
          nullable: true
      additionalProperties: false
    AgentError:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          nullable: true
        retriable:
          type: boolean
      additionalProperties: false
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
      additionalProperties: false
    ApiInfo:
      type: object
      properties:
        name:
          type: string
          example: QuantDinger Python API
        version:
          type: string
          example: 3.0.22
        status:
          type: string
          example: running
        timestamp:
          type: string
          format: date-time
      additionalProperties: false
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
      additionalProperties: false
  responses:
    DEFAULT_ERROR:
      description: Default error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
tags:
- name: Health
  description: Liveness and API metadata (Public)
- name: Policy
  description: Capability and broker policy discovery (Public)
- name: Auth
  description: Authentication and OAuth (Public)
- name: Users
  description: User profile and administration (Mixed)
- name: Market
  description: Market data and watchlists (Public)
- name: Indicator
  description: Indicator IDE workspace (Public)
- name: Backtest
  description: Indicator backtesting (Public)
- name: Strategy
  description: Strategy runtime and bots (Internal)
- name: Community
  description: Indicator marketplace (Public)
- name: Credentials
  description: Exchange credential vault (Internal)
- name: Dashboard
  description: Dashboard aggregates (Internal)
- name: Portfolio
  description: Manual portfolio tracking (Internal)
- name: Settings
  description: System and brand settings (Mixed)
- name: Billing
  description: Membership and USDT billing (Internal)
- name: Experiment
  description: Strategy tuning experiments (Internal)
- name: FastAnalysis
  description: Fast AI analysis (Public)
- name: GlobalMarket
  description: Global market overview (Public)
- name: AIChat
  description: Legacy AI chat compatibility (Internal)
- name: QuickTrade
  description: Manual quick trade (Internal)
- name: IBKR
  description: Interactive Brokers adapter (Internal)
- name: Alpaca
  description: Alpaca adapter (Internal)
- name: MT5
  description: MetaTrader 5 adapter (Internal)
servers:
- url: http://localhost:5000
  description: Backend direct (python run.py)
- url: http://localhost:8888
  description: Docker Compose (via reverse proxy)
paths:
  /:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiInfo'
      summary: API root
      tags:
      - Health
      operationId: getApiRoot
      x-visibility: public
  /health:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
      summary: Health check
      tags:
      - Health
      operationId: getHealth
      x-visibility: public
  /api/health:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
      summary: Health check (compat path)
      tags:
      - Health
      description: Used by Docker health checks and reverse-proxy probes.
      operationId: getApiHealthCompat
      x-visibility: public
  /api/policy/broker-market:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Return the full broker x market x market_type compatibility matrix.
      description: "Response shape (kept stable for the frontend):\n{\n  \"code\"\
        : 1,\n  \"data\": {\n    \"broker_markets\": {\n        \"ibkr\":   {\"USStock\"\
        : [\"spot\"]},\n        \"mt5\":    {\"Forex\":   [\"spot\"]},\n        \"\
        alpaca\": {\"USStock\": [\"spot\"], \"Crypto\": [\"spot\"]},\n        \"binance\"\
        : {\"Crypto\":  [\"spot\", \"swap\"]},\n        ...\n    },\n    \"long_only_brokers\"\
        : [\"alpaca\", \"ibkr\"],\n    \"bot_type_markets\": {\n        \"grid\":\
        \       [\"Crypto\", \"Forex\"],\n        \"martingale\": [\"Crypto\"],\n\
        \        \"dca\":        [\"Crypto\", \"Forex\", \"USStock\"],\n        \"\
        trend\":      [\"Crypto\", \"Forex\", \"USStock\"]\n    },\n    \"live_market_categories\"\
        : [\"Crypto\", \"Forex\", \"USStock\"]\n  }\n}"
      tags:
      - Policy
      operationId: getApiPolicyBrokerMarket
      x-visibility: public
  /api/auth/security-config:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Get public security configuration for frontend.
      description: 'Returns:

        turnstile_enabled: bool

        turnstile_site_key: str

        registration_enabled: bool

        oauth_google_enabled: bool

        oauth_github_enabled: bool'
      tags:
      - Auth
      operationId: getApiAuthSecurityConfig
      x-visibility: public
  /api/auth/login:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: User login endpoint.
      description: "Request body:\n    username: str\n    password: str\n    turnstile_token:\
        \ str (optional, required if Turnstile is enabled)\n\nReturns:\n    token:\
        \ JWT token\n    userinfo: User information"
      tags:
      - Auth
      operationId: postApiAuthLogin
      x-visibility: public
  /api/auth/login-code:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Login with email verification code (quick login / register).
      description: 'Request body:

        email: str

        code: str (verification code)

        turnstile_token: str (optional)

        referral_code: str (optional, referrer''s user ID - only for new users)


        Login with email verification code (quick login / register).

        If user doesn''t exist, create a new account automatically.'
      tags:
      - Auth
      operationId: postApiAuthLoginCode
      x-visibility: public
  /api/auth/send-code:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Send verification code to email.
      description: 'Request body:

        email: str

        type: str (register, reset_password, change_password, change_email)

        turnstile_token: str (optional)'
      tags:
      - Auth
      operationId: postApiAuthSendCode
      x-visibility: public
  /api/auth/register:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Register new user with email verification.
      description: 'Request body:

        email: str

        code: str (verification code)

        username: str

        password: str

        turnstile_token: str (optional)

        referral_code: str (optional, referrer''s user ID)'
      tags:
      - Auth
      operationId: postApiAuthRegister
      x-visibility: public
  /api/auth/reset-password:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Reset password with email verification.
      description: 'Request body:

        email: str

        code: str (verification code)

        new_password: str

        turnstile_token: str (optional)'
      tags:
      - Auth
      operationId: postApiAuthResetPassword
      x-visibility: public
  /api/auth/change-password:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Change password with email verification (for logged-in users).
      description: 'Request body:

        code: str (verification code sent to user''s email)

        new_password: str'
      tags:
      - Auth
      operationId: postApiAuthChangePassword
      x-visibility: public
  /api/auth/oauth/google:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Redirect to Google OAuth authorization page.
      description: "Query params:\nredirect: optional front-end URL (must be allow-listed).\
        \ When provided,\n          after successful login the user is redirected\
        \ there instead of\n          the default FRONTEND_URL. Supports multi-frontend\
        \ (PC + mobile)."
      tags:
      - Auth
      operationId: getApiAuthOauthGoogle
      x-visibility: public
  /api/auth/oauth/google/callback:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Handle Google OAuth callback
      tags:
      - Auth
      operationId: getApiAuthOauthGoogleCallback
      x-visibility: public
  /api/auth/oauth/github:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Redirect to GitHub OAuth authorization page.
      description: 'Query params:

        redirect: optional front-end URL (must be allow-listed), see oauth_google.'
      tags:
      - Auth
      operationId: getApiAuthOauthGithub
      x-visibility: public
  /api/auth/oauth/github/callback:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Handle GitHub OAuth callback
      tags:
      - Auth
      operationId: getApiAuthOauthGithubCallback
      x-visibility: public
  /api/auth/logout:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Logout (client removes token; server is stateless).
      tags:
      - Auth
      operationId: postApiAuthLogout
      x-visibility: public
  /api/auth/info:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Get current user info.
      tags:
      - Auth
      operationId: getApiAuthInfo
      x-visibility: public
  /api/users/list:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: List all users (admin only).
      description: 'Query params:

        page: int (default 1)

        page_size: int (default 20, max 100)

        search: str (optional, search by username/email/nickname/id)

        user_id: int (optional, exact user id filter)'
      tags:
      - Users
      operationId: getApiUsersList
      x-visibility: internal
  /api/users/export:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Export all users as an Excel-friendly CSV file (admin only).
      tags:
      - Users
      operationId: getApiUsersExport
      x-visibility: internal
  /api/users/detail:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Get user detail by ID (admin only)
      tags:
      - Users
      operationId: getApiUsersDetail
      x-visibility: internal
  /api/users/create:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Create a new user (admin only).
      description: 'Request body:

        username: str (required)

        password: str (required)

        email: str (optional)

        nickname: str (optional)

        role: str (optional, default ''user'')'
      tags:
      - Users
      operationId: postApiUsersCreate
      x-visibility: internal
  /api/users/update:
    put:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Update user information (admin only).
      description: "Query params:\n    id: int (required)\n\nRequest body:\n    email:\
        \ str (optional)\n    nickname: str (optional)\n    role: str (optional)\n\
        \    status: str (optional)"
      tags:
      - Users
      operationId: putApiUsersUpdate
      x-visibility: internal
  /api/users/delete:
    delete:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Delete a user (admin only)
      tags:
      - Users
      operationId: deleteApiUsersDelete
      x-visibility: internal
  /api/users/reset-password:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Reset a user's password (admin only).
      description: 'Request body:

        user_id: int (required)

        new_password: str (required)'
      tags:
      - Users
      operationId: postApiUsersResetPassword
      x-visibility: internal
  /api/users/roles:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Get available roles and their permissions
      tags:
      - Users
      operationId: getApiUsersRoles
      x-visibility: internal
  /api/users/set-credits:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Set user credits (admin only).
      description: 'Request body:

        user_id: int (required)

        credits: int (required)

        remark: str (optional)'
      tags:
      - Users
      operationId: postApiUsersSetCredits
      x-visibility: internal
  /api/users/set-vip:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Set user VIP status (admin only).
      description: 'Request body:

        user_id: int (required)

        vip_days: int (optional, 0 to cancel VIP, positive number to grant VIP for
        days)

        vip_expires_at: str (optional, ISO format datetime, overrides vip_days if
        provided)

        remark: str (optional)'
      tags:
      - Users
      operationId: postApiUsersSetVip
      x-visibility: internal
  /api/users/credits-log:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Get user credits log (admin only).
      description: 'Query params:

        user_id: int (required)

        page: int (default 1)

        page_size: int (default 20)'
      tags:
      - Users
      operationId: getApiUsersCreditsLog
      x-visibility: internal
  /api/users/login-logs:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Paginated account login history (password / email code / OAuth).
      tags:
      - Users
      operationId: getApiUsersLoginLogs
      x-visibility: internal
  /api/users/profile:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Get current user's profile with billing info and notification settings
      tags:
      - Users
      operationId: getApiUsersProfile
      x-visibility: internal
  /api/users/profile/update:
    put:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Update current user's profile (limited fields).
      description: "Request body:\n    nickname: str (optional)\n    avatar: str (optional)\n\
        \    timezone: str (optional, IANA id; empty = follow client)\n\nNote: Email\
        \ cannot be changed after registration (for security).\n      Only admin can\
        \ change user email via User Management."
      tags:
      - Users
      operationId: putApiUsersProfileUpdate
      x-visibility: internal
  /api/users/my-credits-log:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Get current user's credits log.
      description: 'Query params:

        page: int (default 1)

        page_size: int (default 20)'
      tags:
      - Users
      operationId: getApiUsersMyCreditsLog
      x-visibility: internal
  /api/users/my-referrals:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Get list of users referred by current user.
      description: "Query params:\n    page: int (default 1)\n    page_size: int (default\
        \ 20)\n\nReturns:\n    list: Users referred by current user (id, username,\
        \ nickname, avatar, created_at)\n    total: Total count of referrals\n   \
        \ referral_code: Current user's referral code (user ID)\n    referral_bonus:\
        \ Credits earned per referral\n    register_bonus: Credits new users get on\
        \ registration"
      tags:
      - Users
      operationId: getApiUsersMyReferrals
      x-visibility: internal
  /api/users/notification-settings:
