<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>K 线查看器 · QuantDinger</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0f1116;
  --bg-2: #161922;
  --bg-3: #1d2230;
  --bg-4: #252a3a;
  --fg: #e6edf3;
  --fg-2: #8b95a8;
  --fg-3: #5b6478;
  --border: #2a3041;
  --border-2: #1d2230;
  --accent: #2d7ff9;        /* QuantDinger 蓝 */
  --accent-2: #5695ff;
  --accent-dim: rgba(45, 127, 249, 0.15);
  --pos: #26a69a;           /* 涨-绿 */
  --neg: #ef5350;           /* 跌-红 */
  --ma5: #ff9800;
  --ma10: #2d7ff9;
  --ma20: #ab47bc;
  --macd-dif: #ffeb3b;
  --shadow: 0 1px 3px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 13px;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

/* ─── 顶部品牌栏 ─── */
.brand-bar {
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 200;
}
.brand-bar .logo {
  display: flex; align-items: center; gap: 8px;
  font-weight: 600; font-size: 15px; color: var(--fg);
}
.brand-bar .logo-icon {
  width: 26px; height: 26px; border-radius: 6px;
  background: linear-gradient(135deg, #2d7ff9, #5695ff);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.brand-bar .logo small { color: var(--fg-2); font-weight: 400; font-size: 11px; margin-left: 6px; }

/* 市场切换 */
.market-tabs {
  display: flex; gap: 4px;
  background: var(--bg-3); border-radius: 6px; padding: 3px;
}
.market-tabs button {
  background: transparent; color: var(--fg-2); border: none;
  padding: 5px 12px; border-radius: 4px; cursor: pointer;
  font-size: 12px; font-weight: 500; transition: all 0.15s;
}
.market-tabs button:hover { color: var(--fg); }
.market-tabs button.active {
  background: var(--accent); color: white; box-shadow: var(--shadow);
}

/* 搜索 */
.search-box { flex: 1; min-width: 200px; max-width: 480px; position: relative; }
.search-box input {
  width: 100%; padding: 8px 12px 8px 32px;
  background: var(--bg-3); color: var(--fg);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; outline: none; transition: border-color 0.15s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: "🔍"; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 13px; pointer-events: none; color: var(--fg-2);
}
.search-result {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--bg-3); border: 1px solid var(--border); border-radius: 6px;
  max-height: 320px; overflow-y: auto; z-index: 300;
  display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  margin-top: 4px;
}
.search-result.active { display: block; }
.search-result .item {
  padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  transition: background 0.1s;
}
.search-result .item:hover { background: var(--bg-4); }
.search-result .item:last-child { border-bottom: none; }
.search-result .item .name { font-weight: 500; }
.search-result .item .code { color: var(--fg-2); font-family: monospace; font-size: 11px; }

/* 操作按钮 */
.btn {
  background: var(--accent); color: white; border: none; padding: 7px 14px;
  border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
  transition: background 0.15s; display: inline-flex; align-items: center; gap: 4px;
}
.btn:hover { background: var(--accent-2); }
.btn-ghost {
  background: transparent; color: var(--fg-2); border: 1px solid var(--border);
  padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px;
}
.btn-ghost:hover { color: var(--fg); border-color: var(--accent); }
.btn-ghost.active { background: var(--accent); color: white; border-color: var(--accent); }
.btn-icon { padding: 6px 8px; min-width: 32px; justify-content: center; }

/* 主体两列布局 */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 12px; padding: 12px;
  min-height: calc(100vh - 50px);
}
@media (max-width: 1024px) {
  .main-layout { grid-template-columns: 1fr; }
}

/* 卡片 */
.card {
  background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 12px; overflow: hidden;
}
.card-head {
  padding: 10px 14px; border-bottom: 1px solid var(--border-2);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-2);
}
.card-title { font-size: 13px; font-weight: 500; color: var(--fg); display: flex; align-items: center; gap: 6px; }
.card-body { padding: 12px 14px; }

/* 当前标的卡片 */
.symbol-card {
  padding: 14px 16px;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px;
}
.symbol-info { display: flex; flex-direction: column; gap: 2px; }
.symbol-name { font-size: 18px; font-weight: 600; }
.symbol-code { color: var(--fg-2); font-family: monospace; font-size: 11px; }
.symbol-price-block { display: flex; gap: 20px; align-items: center; }
.price-main { text-align: right; }
.price-main .label { font-size: 11px; color: var(--fg-2); }
.price-main .value { font-size: 22px; font-weight: 600; line-height: 1.2; }
.price-main .change { font-size: 13px; margin-top: 2px; }

/* 周期 + 指标行 */
.chart-toolbar {
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 8px 14px;
  border-bottom: 1px solid var(--border-2); background: var(--bg-2);
}
.timeframe-group, .indicator-group, .quick-pick {
  display: flex; gap: 2px; align-items: center;
}
.toolbar-label {
  font-size: 11px; color: var(--fg-2); margin-right: 6px;
}
.tf-btn, .ind-btn {
  background: transparent; color: var(--fg-2); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 4px; cursor: pointer;
  font-size: 12px; font-weight: 500; transition: all 0.1s;
  min-width: 38px;
}
.tf-btn:hover, .ind-btn:hover { color: var(--fg); border-color: var(--accent-2); }
.tf-btn.active, .ind-btn.active {
  background: var(--accent); color: white; border-color: var(--accent);
}
.toolbar-select {
  background: var(--bg-3); color: var(--fg); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer; outline: none;
}
.toolbar-select:focus { border-color: var(--accent); }

/* K线图 */
.chart-area { padding: 0; }
#klineChart { width: 100%; height: 580px; }

/* 底部 Tab 区 */
.bottom-tabs {
  border-top: 1px solid var(--border); margin-top: 4px;
  background: var(--bg-2);
}
.bottom-tab-head {
  display: flex; gap: 0; border-bottom: 1px solid var(--border-2);
  background: var(--bg-2);
}
.bottom-tab-head .tab {
  padding: 10px 18px; cursor: pointer; color: var(--fg-2);
  font-size: 13px; font-weight: 500;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.bottom-tab-head .tab:hover { color: var(--fg); }
.bottom-tab-head .tab.active {
  color: var(--accent); border-bottom-color: var(--accent);
  background: var(--bg-3);
}
.bottom-tab-body { padding: 12px 14px; }
.bottom-tab-body.hidden { display: none; }

/* 表格 */
.table-wrap { overflow-x: auto; max-height: 380px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th, td { padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border-2); }
th:first-child, td:first-child { text-align: left; }
th { background: var(--bg-3); color: var(--fg-2); font-weight: 500; position: sticky; top: 0; }
tbody tr:hover { background: var(--bg-3); }
.pos { color: var(--pos); }
.neg { color: var(--neg); }

/* 自选股列表 */
.watchlist-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 12px; background: var(--bg-3); border: 1px solid var(--border);
  border-radius: 6px; margin-bottom: 6px; cursor: pointer;
  transition: all 0.15s;
}
.watchlist-item:hover { border-color: var(--accent); background: var(--bg-4); }
.watchlist-item.selected { border-color: var(--accent); background: var(--accent-dim); }
.watchlist-item .info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
.watchlist-item .info .name {
  font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.watchlist-item .info .code { font-size: 10px; color: var(--fg-2); font-family: monospace; }
.watchlist-item .right { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.watchlist-item .price { font-weight: 600; font-size: 13px; }
.watchlist-item .chg { font-size: 10px; }
.watchlist-item .remove {
  color: var(--fg-3); cursor: pointer; padding: 2px 6px; margin-left: 6px;
  border-radius: 3px; transition: all 0.15s;
}
.watchlist-item .remove:hover { color: var(--neg); background: rgba(239, 83, 80, 0.1); }

/* 右侧栏 */
.side-panel { display: flex; flex-direction: column; gap: 12px; }

/* 通知 */
.notice {
  padding: 8px 12px; border-radius: 6px; font-size: 12px;
  display: none; margin: 0 14px 10px;
}
.notice.active { display: block; }
.notice-info { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent-2); }
.notice-error { background: rgba(239, 83, 80, 0.1); border: 1px solid rgba(239, 83, 80, 0.3); color: #ef9a9a; }
.notice-success { background: rgba(38, 166, 154, 0.1); border: 1px solid rgba(38, 166, 154, 0.3); color: #80cbc4; }

/* 统计卡 */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
.stat {
  background: var(--bg-3); border: 1px solid var(--border); border-radius: 6px; padding: 10px;
}
.stat .label { font-size: 11px; color: var(--fg-2); margin-bottom: 3px; }
.stat .value { font-size: 16px; font-weight: 600; }

/* 图表(资金流、回测) */
.mini-chart { width: 100%; height: 280px; }

/* 加载 */
.loading { text-align: center; padding: 20px; color: var(--fg-2); font-size: 12px; }
.empty-state {
  text-align: center; padding: 30px 16px; color: var(--fg-2); font-size: 12px;
}
.empty-state .icon { font-size: 36px; margin-bottom: 8px; opacity: 0.4; }

/* 移动端适配 */
@media (max-width: 768px) {
  .brand-bar { padding: 8px 10px; gap: 8px; }
  .market-tabs { order: 3; width: 100%; justify-content: space-between; }
  .search-box { order: 2; min-width: 140px; }
  .main-layout { padding: 8px; gap: 8px; }
  .symbol-card { padding: 10px; }
  .symbol-name { font-size: 16px; }
  .price-main .value { font-size: 18px; }
  .chart-toolbar { padding: 6px 8px; gap: 6px; }
  .tf-btn { padding: 3px 7px; min-width: 32px; font-size: 11px; }
  #klineChart { height: 380px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .stat .value { font-size: 14px; }
}
</style>
</head>
<body>

<!-- ─── 顶部品牌栏 ─── -->
<div class="brand-bar">
  <div class="logo">
    <div class="logo-icon">📊</div>
    <span>K 线查看器<small>· QuantDinger 多市场</small></span>
  </div>

  <div class="market-tabs" id="marketTabs">
    <button data-mkt="CNStock" class="active">🇨🇳 A 股</button>
    <button data-mkt="HKStock">🇭🇰 港股</button>
    <button data-mkt="USStock">🇺🇸 美股</button>
    <button data-mkt="Crypto">₿ 加密</button>
    <button data-mkt="Forex">💱 外汇</button>
    <button data-mkt="Futures">📊 期货</button>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索代码/名称 (例:600519、AAPL、BTCUSDT)" autocomplete="off">
    <div class="search-result" id="searchResult"></div>
  </div>

  <button class="btn-ghost" id="backToQDBtn" title="返回 QuantDinger">
    <span>←</span> QuantDinger
  </button>
</div>

<!-- ─── 主体两列布局 ─── -->
<div class="main-layout">
  <!-- 左:K线主体 -->
  <div class="left-panel">
    <div id="notice-kline" class="notice"></div>
    <div id="notice-mf" class="notice"></div>
    <div id="notice-bt" class="notice"></div>

    <!-- 当前标的信息 -->
    <div class="card">
      <div class="symbol-card">
        <div class="symbol-info">
          <div class="symbol-name" id="stockName">-- 请搜索标的 --</div>
          <div class="symbol-code" id="stockCode">--</div>
        </div>
        <div class="symbol-price-block">
          <div class="price-main">
            <div class="label">最新价</div>
            <div class="value" id="stockPrice">--</div>
            <div class="change" id="stockChange">--</div>
          </div>
          <button class="btn" id="addToWatchlistBtn">⭐ 加自选</button>
        </div>
      </div>
    </div>

    <!-- K线图 + 工具栏 -->
    <div class="card">
      <div class="chart-toolbar">
        <div class="timeframe-group">
          <span class="toolbar-label">K线周期</span>
          <button class="tf-btn" data-tf="1m">1m</button>
          <button class="tf-btn" data-tf="5m">5m</button>
          <button class="tf-btn" data-tf="15m">15m</button>
          <button class="tf-btn" data-tf="30m">30m</button>
          <button class="tf-btn" data-tf="1H">1H</button>
          <button class="tf-btn" data-tf="4H">4H</button>
          <button class="tf-btn active" data-tf="1D">1D</button>
          <button class="tf-btn" data-tf="1W">1W</button>
        </div>
        <div style="width: 1px; height: 20px; background: var(--border); margin: 0 4px;"></div>
        <div class="indicator-group">
          <span class="toolbar-label">主图指标</span>
          <select class="toolbar-select" id="mainIndicator">
            <option value="MA">MA (5/10/20)</option>
            <option value="EMA">EMA (12/26)</option>
            <option value="BOLL">BOLL (20,2)</option>
            <option value="NONE">无</option>
          </select>
        </div>
        <div class="indicator-group">
          <span class="toolbar-label">副图</span>
          <select class="toolbar-select" id="subIndicator">
            <option value="VOL_MACD">VOL + MACD</option>
            <option value="VOL_RSI">VOL + RSI</option>
            <option value="MACD">仅 MACD</option>
            <option value="VOL">仅 VOL</option>
          </select>
        </div>
        <div style="margin-left: auto; display: flex; gap: 6px;">
          <button class="btn-ghost" id="fullscreenBtn" title="全屏">⛶</button>
          <button class="btn" id="loadKlineBtn">🔄 刷新</button>
        </div>
      </div>
      <div id="klineChart" class="chart-area"></div>
    </div>

    <!-- 底部 Tab 区:图表与交易 / 回测与结果 / 资金流向 / 自选股 -->
    <div class="card">
      <div class="bottom-tab-head">
        <div class="tab active" data-btab="chart">⚡ 图表与交易</div>
        <div class="tab" data-btab="backtest">📈 回测与结果</div>
        <div class="tab" data-btab="moneyflow">💰 资金流向</div>
        <div class="tab" data-btab="watchlist">⭐ 自选股</div>
      </div>

      <div class="bottom-tab-body" id="btab-chart">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div>
            <div class="toolbar-label" style="margin-bottom: 6px;">📊 闪电交易</div>
            <select class="toolbar-select" id="quickSymbolSelect" style="width: 100%; padding: 6px;">
              <option value="">-- 选择自选标的 --</option>
            </select>
            <div style="margin-top: 10px; font-size: 11px; color: var(--fg-2); line-height: 1.6;">
              <div>• 点击自选股快速切到该标的</div>
              <div>• 双击图表还原到全部数据</div>
              <div>• 滚轮缩放、拖动平移</div>
            </div>
          </div>
          <div>
            <div class="toolbar-label" style="margin-bottom: 6px;">📐 图表设置</div>
            <div style="font-size: 12px; color: var(--fg-2); line-height: 1.8;">
              <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="showVolume" checked> 显示成交量
              </label>
              <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="showMACD" checked> 显示 MACD
              </label>
              <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="crossSync" checked> 十字光标联动
              </label>
            </div>
          </div>
        </div>
      </div>

      <div class="bottom-tab-body hidden" id="btab-backtest">
        <div class="card-body" style="padding: 0;">
          <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px;">
            <label class="toolbar-label" style="margin: 0;">N (主力均线周期)
              <input type="number" id="btN" value="5" min="1" max="60" style="background: var(--bg-3); color: var(--fg); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; width: 60px; font-size: 12px; margin-left: 4px;">
            </label>
            <label class="toolbar-label" style="margin: 0;">初始资金
              <input type="number" id="btCapital" value="100000" min="10000" step="10000" style="background: var(--bg-3); color: var(--fg); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; width: 100px; font-size: 12px; margin-left: 4px;">
            </label>
            <button class="btn" id="btBtn">🚀 跑回测</button>
            <span style="color: var(--fg-2); font-size: 11px;">规则:主力 N 日均线 > 0 → 次日开盘满仓,否则空仓</span>
          </div>
          <div id="btStats" class="stats" style="margin-bottom: 12px;"></div>
          <div id="btEqChart" class="mini-chart"></div>
        </div>
      </div>

      <div class="bottom-tab-body hidden" id="btab-moneyflow">
        <div style="font-size: 11px; color: var(--fg-2); margin-bottom: 8px;">⚠️ 资金流向数据仅 A 股可用(其他市场数据源不提供资金流明细)</div>
        <div class="table-wrap" style="max-height: 300px;">
          <table id="mfTable">
            <thead>
              <tr>
                <th>交易日期</th>
                <th>主力净流入</th>
                <th>特大单</th>
                <th>大单</th>
                <th>中单</th>
                <th>小单</th>
                <th>全单</th>
                <th>涨跌幅</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div id="mfLineChart" class="mini-chart" style="margin-top: 12px;"></div>
      </div>

      <div class="bottom-tab-body hidden" id="btab-watchlist">
        <div id="watchlistContainer">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 右侧:自选股 + 推荐 -->
  <div class="side-panel">
    <div class="card">
      <div class="card-head">
        <div class="card-title">⭐ 我的自选股</div>
        <div style="font-size: 11px; color: var(--fg-2);" id="watchlistCount">0 只</div>
      </div>
      <div class="card-body" id="sideWatchlist" style="max-height: 480px; overflow-y: auto; padding: 8px;">
        <div class="empty-state">
          <div class="icon">⭐</div>
          <div>暂无自选</div>
          <div style="font-size: 10px; margin-top: 4px;">点 ⭐ 加自选 添加</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">🔥 热门标的</div>
        <button class="btn-ghost" id="refreshHotBtn" style="padding: 2px 8px; font-size: 10px;">↻</button>
      </div>
      <div class="card-body" id="hotList" style="max-height: 380px; overflow-y: auto; padding: 8px;">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

// ───────── 配置 ─────────
const API_BASE = '/api';
let currentSymbol = null;
let currentMarket = 'CNStock';
let currentStockName = null;
let currentTf = '1D';
let klineChart = null;
let mfLineChart = null;
let btEqChart = null;
let cachedKlines = null;
let cachedMoneyflow = null;
let watchlistCache = [];

const SUPPORTS_MONEYFLOW = () => currentMarket === 'CNStock';

// 时间周期 (按 QuantDinger 截图顺序 + 用户要求)
const TIMEFRAMES = ['1m', '5m', '15m', '30m', '1H', '4H', '1D', '1W'];

// ───────── 工具 ─────────
const $ = id => document.getElementById(id);
const fmtNum = n => {
  if (n === null || n === undefined || isNaN(n)) return '--';
  const abs = Math.abs(n);
  if (abs >= 1e8) return (n / 1e8).toFixed(2) + '亿';
  if (abs >= 1e4) return (n / 1e4).toFixed(2) + '万';
  return n.toFixed(2);
};
const compactToYmd = s => {
  s = String(s || '').trim();
  if (/^\d{8}$/.test(s)) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  return s.slice(0, 10);
};
const notice = (section, msg, kind = 'info') => {
  const n = $('notice-' + section);
  if (!n) return;
  n.className = 'notice notice-' + kind + ' active';
  n.textContent = msg;
  if (kind !== 'error') setTimeout(() => n.classList.remove('active'), 4000);
};
const dismissNotice = section => {
  const n = $('notice-' + section);
  if (n) n.classList.remove('active');
};

// ───────── API 包装 ─────────
async function api(path, opts = {}) {
  const url = API_BASE + path;
  const res = await fetch(url, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    ...opts,
  });
  let json;
  try { json = await res.json(); } catch (e) { throw new Error(`HTTP ${res.status}: ${res.statusText}`); }
  if (json.code === 1) return json.data;
  throw new Error(json.msg || `API error (code ${json.code})`);
}

// ───────── 指标计算 ─────────
function calcMA(closeArr, n) {
  const out = new Array(closeArr.length).fill(null);
  let sum = 0;
  for (let i = 0; i < closeArr.length; i++) {
    sum += closeArr[i];
    if (i >= n) sum -= closeArr[i - n];
    if (i >= n - 1) out[i] = +(sum / n).toFixed(4);
  }
  return out;
}
function calcEMA(closeArr, n) {
  const out = new Array(closeArr.length).fill(null);
  const k = 2 / (n + 1);
  let prev = null;
  for (let i = 0; i < closeArr.length; i++) {
    if (i === 0) prev = closeArr[i];
    else prev = closeArr[i] * k + prev * (1 - k);
    out[i] = +prev.toFixed(4);
  }
  return out;
}
function calcBOLL(closeArr, n = 20, k = 2) {
  const mid = calcMA(closeArr, n);
  const upper = new Array(closeArr.length).fill(null);
  const lower = new Array(closeArr.length).fill(null);
  for (let i = 0; i < closeArr.length; i++) {
    if (i < n - 1 || mid[i] === null) continue;
    let sumSq = 0;
    for (let j = i - n + 1; j <= i; j++) {
      const d = closeArr[j] - mid[i];
      sumSq += d * d;
    }
    const sd = Math.sqrt(sumSq / n);
    upper[i] = +(mid[i] + k * sd).toFixed(4);
    lower[i] = +(mid[i] - k * sd).toFixed(4);
  }
  return { mid, upper, lower };
}
function calcMACD(closeArr) {
  const ema12 = calcEMA(closeArr, 12);
  const ema26 = calcEMA(closeArr, 26);
  const dif = closeArr.map((_, i) => +(ema12[i] - ema26[i]).toFixed(4));
  const dea = calcEMA(dif, 9);
  const macd = dif.map((v, i) => +((v - dea[i]) * 2).toFixed(4));
  return { dif, dea, macd };
}
function calcRSI(closeArr, n = 14) {
  const out = new Array(closeArr.length).fill(null);
  let gain = 0, loss = 0;
  for (let i = 1; i < closeArr.length; i++) {
    const d = closeArr[i] - closeArr[i - 1];
    if (i <= n) {
      if (d > 0) gain += d; else loss -= d;
      if (i === n) {
        const rs = gain / n / (loss / n || 1);
        out[i] = +(100 - 100 / (1 + rs)).toFixed(2);
      }
    } else {
      const g = d > 0 ? d : 0;
      const l = d < 0 ? -d : 0;
      const prevGain = (out[i - 1] / 100 * (1 + 1) - 1) * (100 - out[i - 1]) / 100; // 简化
      // 使用 Wilder smoothing
      gain = (gain * (n - 1) + g) / n;
      loss = (loss * (n - 1) + l) / n;
      const rs = gain / (loss || 1e-10);
      out[i] = +(100 - 100 / (1 + rs)).toFixed(2);
    }
  }
  return out;
}

// ───────── 搜索 ─────────
let searchTimer = null;
const searchInput = $('searchInput');
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (q.length < 1) { $('searchResult').classList.remove('active'); return; }
  searchTimer = setTimeout(() => doSearch(q), 280);
});
searchInput.addEventListener('focus', () => {
  if (searchInput.value.trim()) $('searchResult').classList.add('active');
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-box')) $('searchResult').classList.remove('active');
});

async function doSearch(q) {
  try {
    const data = await api(`/market/symbols/search?keyword=${encodeURIComponent(q)}&market=${currentMarket}&limit=15`);
    const list = Array.isArray(data) ? data : (data.items || data.symbols || []);
    const box = $('searchResult');
    if (!list.length) {
      box.innerHTML = '<div class="item" style="color:var(--fg-2);cursor:default">无结果,试试其他关键词</div>';
    } else {
      box.innerHTML = list.map(s => {
        const code = s.symbol || s.code || s.value || '';
        const name = s.name || s.label || s.display_name || code;
        return `<div class="item" data-code="${code}" data-name="${name.replace(/"/g, '&quot;')}">
          <span class="name">${name}</span>
          <span class="code">${code}</span>
        </div>`;
      }).join('');
      box.querySelectorAll('.item[data-code]').forEach(item => {
        item.addEventListener('click', () => {
          selectStock(item.dataset.code, item.dataset.name);
          box.classList.remove('active');
          searchInput.value = '';
        });
      });
    }
    box.classList.add('active');
  } catch (e) {
    notice('kline', '搜索失败: ' + e.message, 'error');
  }
}

async function selectStock(symbol, name) {
  currentSymbol = symbol;
  currentStockName = name;
  $('stockName').textContent = name || symbol;
  $('stockCode').textContent = symbol + ' · ' + MARKET_LABEL[currentMarket];
  await loadKline();
}

// ───────── K线加载 ─────────
async function loadKline() {
  if (!currentSymbol) { notice('kline', '请先在搜索框选一只标的', 'info'); return; }
  notice('kline', '加载 K 线中...', 'info');
  try {
    // 1m/5m 数据量大,限小一点
    const tfLimit = ['1m', '5m'].includes(currentTf) ? 500 : 300;
    const data = await api(`/kline?market=${currentMarket}&symbol=${encodeURIComponent(currentSymbol)}&timeframe=${currentTf}&limit=${tfLimit}`);
    const klines = Array.isArray(data) ? data : (data.klines || data.data || []);
    if (!klines.length) throw new Error('后端返回空数据');
    cachedKlines = klines;
    renderKline(klines);

    // 拉最新价
    try {
      const tk = await api(`/market/price?market=${currentMarket}&symbol=${encodeURIComponent(currentSymbol)}`);
      const t = tk.price || tk;
      $('stockPrice').textContent = t.last ?? '--';
      const cp = t.changePercent ?? 0;
      const ch = $('stockChange');
      ch.textContent = (cp >= 0 ? '+' : '') + cp.toFixed(2) + '%';
      ch.className = 'change ' + (cp >= 0 ? 'pos' : 'neg');
    } catch (e) { /* 价格拉不到不影响 K 线 */ }

    notice('kline', `已加载 ${klines.length} 条 K 线 (${currentTf})`, 'success');
  } catch (e) {
    notice('kline', 'K 线加载失败: ' + e.message, 'error');
  }
}

function renderKline(klines) {
  const dates = klines.map(k => compactToYmd(k.time || k.date || k.timestamp || k.t));
  const ohlc = klines.map(k => [+k.open, +k.close, +k.low, +k.high]);
  const closeArr = klines.map(k => +k.close);
  const volArr = klines.map(k => +k.volume);

  // 主图指标
  const mainInd = $('mainIndicator').value;
  const mainSeries = [];
  if (mainInd === 'MA') {
    mainSeries.push({ name: 'MA5',  type: 'line', data: calcMA(closeArr, 5),  smooth: true, lineStyle: { width: 1, color: 'var(--ma5)' }, symbol: 'none' });
    mainSeries.push({ name: 'MA10', type: 'line', data: calcMA(closeArr, 10), smooth: true, lineStyle: { width: 1, color: 'var(--ma10)' }, symbol: 'none' });
    mainSeries.push({ name: 'MA20', type: 'line', data: calcMA(closeArr, 20), smooth: true, lineStyle: { width: 1, color: 'var(--ma20)' }, symbol: 'none' });
  } else if (mainInd === 'EMA') {
    mainSeries.push({ name: 'EMA12', type: 'line', data: calcEMA(closeArr, 12), smooth: true, lineStyle: { width: 1, color: '#ff9800' }, symbol: 'none' });
    mainSeries.push({ name: 'EMA26', type: 'line', data: calcEMA(closeArr, 26), smooth: true, lineStyle: { width: 1, color: '#1e88e5' }, symbol: 'none' });
  } else if (mainInd === 'BOLL') {
    const b = calcBOLL(closeArr);
    mainSeries.push({ name: 'BOLL 上轨', type: 'line', data: b.upper, smooth: true, lineStyle: { width: 1, color: '#ab47bc', opacity: 0.6 }, symbol: 'none' });
    mainSeries.push({ name: 'BOLL 中轨', type: 'line', data: b.mid,   smooth: true, lineStyle: { width: 1, color: '#ff9800' }, symbol: 'none' });
    mainSeries.push({ name: 'BOLL 下轨', type: 'line', data: b.lower, smooth: true, lineStyle: { width: 1, color: '#ab47bc', opacity: 0.6 }, symbol: 'none' });
  }

  // 副图指标
  const subInd = $('subIndicator').value;
  const showVol = $('showVolume').checked;
  const showMACD = $('showMACD').checked;
  const crossSync = $('crossSync').checked;

  // 计算 grid 布局:1-2 个 panel
  const wantVol = showVol && (subInd.includes('VOL') || subInd === 'VOL');
  const wantMacd = showMACD && (subInd.includes('MACD') || subInd === 'MACD');
  const wantRsi = subInd.includes('RSI');
  const panelCount = 1 + (wantVol ? 1 : 0) + ((wantMacd || wantRsi) ? 1 : 0);

  // Grid 高度分配
  const grids = [];
  const xAxes = [];
  const yAxes = [];
  let topCursor = 40, heightMain = 50;
  if (panelCount === 1) heightMain = 78;
  else if (panelCount === 2) heightMain = 56;
  else heightMain = 44;

  // 主图
  grids.push({ left: 50, right: 20, top: topCursor, height: heightMain + '%' });
  xAxes.push({ type: 'category', data: dates, scale: true, boundaryGap: false, axisLine: { lineStyle: { color: '#2a3041' } }, axisLabel: { color: '#8b95a8' }, gridIndex: 0 });
  yAxes.push({ scale: true, axisLine: { lineStyle: { color: '#2a3041' } }, axisLabel: { color: '#8b95a8' }, splitLine: { lineStyle: { color: '#1d2230' } }, gridIndex: 0 });

  // dataZoom 配置
  const dataZoomConfig = [
    { type: 'inside', xAxisIndex: xAxes.map((_, i) => i), throttle: 50, zoomOnMouseWheel: true },
    { type: 'slider', xAxisIndex: xAxes.map((_, i) => i), height: 18, bottom: 5, textStyle: { color: '#8b95a8' }, fillerColor: 'rgba(45, 127, 249, 0.2)' },
  ];

  const series = [
    {
      name: 'K线', type: 'candlestick', data: ohlc, xAxisIndex: 0, yAxisIndex: 0,
      itemStyle: { color: '#26a69a', color0: '#ef5350', borderColor: '#26a69a', borderColor0: '#ef5350' },
    },
    ...mainSeries.map(s => ({ ...s, xAxisIndex: 0, yAxisIndex: 0 })),
  ];

  // 成交量
  let panelIdx = 1;
  let subTopCursor = topCursor + heightMain + 4;
  const subHeight = (100 - heightMain - 8) / (panelCount - 1 || 1);
  if (wantVol) {
    const volData = volArr.map((v, i) => ({
      value: v,
      itemStyle: { color: closeArr[i] >= (i > 0 ? closeArr[i - 1] : closeArr[i]) ? '#ef5350' : '#26a69a' },
    }));
    grids.push({ left: 50, right: 20, top: subTopCursor + '%', height: subHeight + '%' });
    xAxes.push({ type: 'category', data: dates, scale: true, boundaryGap: false, axisLine: { lineStyle: { color: '#2a3041' } }, axisLabel: { color: '#8b95a8' }, gridIndex: panelIdx });
    yAxes.push({ scale: true, gridIndex: panelIdx, axisLine: { lineStyle: { color: '#2a3041' } }, axisLabel: { color: '#8b95a8' }, splitLine: { lineStyle: { color: '#1d2230' } } });
    series.push({ name: '成交量', type: 'bar', data: volData, xAxisIndex: panelIdx, yAxisIndex: panelIdx });
    panelIdx++;
    subTopCursor += subHeight;
  }
  // MACD 或 RSI
  if (wantMacd || wantRsi) {
    grids.push({ left: 50, right: 20, top: subTopCursor + '%', height: subHeight + '%' });
    xAxes.push({ type: 'category', data: dates, scale: true, boundaryGap: false, axisLine: { lineStyle: { color: '#2a3041' } }, axisLabel: { color: '#8b95a8' }, gridIndex: panelIdx });
    yAxes.push({ scale: true, gridIndex: panelIdx, axisLine: { lineStyle: { color: '#2a3041' } }, axisLabel: { color: '#8b95a8' }, splitLine: { lineStyle: { color: '#1d2230' } } });
    if (wantMacd) {
      const { dif, dea, macd } = calcMACD(closeArr);
      const macdBars = macd.map(v => ({ value: v, itemStyle: { color: v >= 0 ? '#ef5350' : '#26a69a' } }));
      series.push({ name: 'DIF', type: 'line', data: dif, xAxisIndex: panelIdx, yAxisIndex: panelIdx, lineStyle: { width: 1, color: '#ffeb3b' }, symbol: 'none' });
      series.push({ name: 'DEA', type: 'line', data: dea, xAxisIndex: panelIdx, yAxisIndex: panelIdx, lineStyle: { width: 1, color: '#2d7ff9' }, symbol: 'none' });
      series.push({ name: 'MACD', type: 'bar', data: macdBars, xAxisIndex: panelIdx, yAxisIndex: panelIdx });
    } else if (wantRsi) {
      const rsi = calcRSI(closeArr, 14);
      series.push({ name: 'RSI 14', type: 'line', data: rsi, xAxisIndex: panelIdx, yAxisIndex: panelIdx, lineStyle: { width: 1, color: '#ab47bc' }, symbol: 'none' });
    }
  }

  // 十字光标联动
  const axisPointer = crossSync
    ? { link: [{ xAxisIndex: 'all' }], label: { backgroundColor: '#2d7ff9' } }
    : { label: { backgroundColor: '#2d7ff9' } };

  if (!klineChart) klineChart = echarts.init($('klineChart'), null, { renderer: 'canvas' });
  klineChart.setOption({
    backgroundColor: 'transparent',
    legend: {
      data: ['K线', ...mainSeries.map(s => s.name), '成交量', 'DIF', 'DEA', 'MACD', 'RSI 14'].filter((v, i, a) => a.indexOf(v) === i),
      textStyle: { color: '#8b95a8' }, top: 8, itemGap: 12, itemWidth: 14, itemHeight: 8,
    },
    axisPointer,
    grid: grids,
    xAxis: xAxes,
    yAxis: yAxes,
    dataZoom: dataZoomConfig,
    animation: false,
    tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
    series,
  }, true);
  // 双击还原
  $('klineChart').ondblclick = () => klineChart.dispatchAction({ type: 'dataZoom', start: 0, end: 100 });
}

// ───────── 资金流向 ─────────
async function loadMoneyflow() {
  if (!currentSymbol) { notice('mf', '请先选标的', 'info'); return; }
  if (!SUPPORTS_MONEYFLOW()) {
    notice('mf', '资金流向功能仅支持 A 股(当前: ' + MARKET_LABEL[currentMarket] + ')', 'error');
    return;
  }
  notice('mf', '加载资金流向...', 'info');
  try {
    const data = await api(`/market/cn-moneyflow?symbol=${encodeURIComponent(currentSymbol)}&days=60`);
    const rows = data.rows || (Array.isArray(data) ? data : []);
    if (!rows.length) { notice('mf', '暂无资金流向数据(可能 akshare 未配置)', 'error'); return; }
    cachedMoneyflow = rows;
    renderMoneyflowTable(rows);
    renderMoneyflowChart(rows);
    notice('mf', `已加载 ${rows.length} 天资金流向`, 'success');
  } catch (e) {
    notice('mf', '资金流向加载失败: ' + e.message, 'error');
  }
}
function renderMoneyflowTable(rows) {
  const tb = $('mfTable').querySelector('tbody');
  tb.innerHTML = rows.slice().reverse().map(r => `
    <tr>
      <td>${r.date}</td>
      <td class="${r.main_net >= 0 ? 'pos' : 'neg'}">${fmtNum(r.main_net)}</td>
      <td class="${r.super_net >= 0 ? 'pos' : 'neg'}">${fmtNum(r.super_net)}</td>
      <td class="${r.big_net >= 0 ? 'pos' : 'neg'}">${fmtNum(r.big_net)}</td>
      <td class="${r.mid_net >= 0 ? 'pos' : 'neg'}">${fmtNum(r.mid_net)}</td>
      <td class="${r.small_net >= 0 ? 'pos' : 'neg'}">${fmtNum(r.small_net)}</td>
      <td class="${r.total_net >= 0 ? 'pos' : 'neg'}">${fmtNum(r.total_net)}</td>
      <td class="${(r.change_pct || 0) >= 0 ? 'pos' : 'neg'}">${(r.change_pct || 0).toFixed(2)}%</td>
    </tr>
  `).join('');
}
function renderMoneyflowChart(rows) {
  const dates = rows.map(r => r.date);
  if (!mfLineChart) mfLineChart = echarts.init($('mfLineChart'), null);
  mfLineChart.setOption({
    backgroundColor: 'transparent',
    legend: { data: ['主力净流入', '5日均线'], textStyle: { color: '#8b95a8' }, top: 5 },
    tooltip: { trigger: 'axis' },
    grid: { left: 60, right: 20, top: 35, bottom: 30 },
    xAxis: { type: 'category', data: dates, axisLabel: { color: '#8b95a8' } },
    yAxis: { type: 'value', axisLabel: { color: '#8b95a8' }, splitLine: { lineStyle: { color: '#1d2230' } } },
    dataZoom: [{ type: 'inside', throttle: 50 }, { type: 'slider', height: 14, bottom: 5 }],
    series: [
      { name: '主力净流入', type: 'line', data: rows.map(r => r.main_net), smooth: true,
        areaStyle: { color: 'rgba(45, 127, 249, 0.3)' }, lineStyle: { color: '#2d7ff9' }, symbol: 'none' },
      { name: '5日均线', type: 'line', data: calcMA(rows.map(r => r.main_net), 5),
        smooth: true, lineStyle: { color: '#ffeb3b', width: 1.5, type: 'dashed' }, symbol: 'none' },
    ],
  }, true);
}

// ───────── 买卖点回测 ─────────
async function runBacktest() {
  if (!currentSymbol) { notice('bt', '请先选标的', 'info'); return; }
  if (!SUPPORTS_MONEYFLOW()) {
    notice('bt', '买卖点回测功能仅支持 A 股(当前: ' + MARKET_LABEL[currentMarket] + ')', 'error');
    return;
  }
  if (!cachedKlines) { await loadKline(); if (!cachedKlines) return; }
  if (!cachedMoneyflow) { await loadMoneyflow(); }

  const N = +$('btN').value || 5;
  const initCap = +$('btCapital').value || 100000;
  notice('bt', '跑回测中...', 'info');

  const kmap = {};
  cachedKlines.forEach(k => kmap[compactToYmd(k.time || k.date)] = k);
  const mfmap = {};
  (cachedMoneyflow || []).forEach(r => mfmap[r.date] = r);
  const dates = cachedKlines.map(k => compactToYmd(k.time || k.date)).filter(d => mfmap[d] && kmap[d]);
  if (dates.length < N + 5) { notice('bt', 'K 线和资金流日期对齐后数据不足', 'error'); return; }

  const mainArr = dates.map(d => mfmap[d].main_net || 0);
  const maN = calcMA(mainArr, N);

  const pos = new Array(dates.length).fill(0);
  for (let i = 1; i < dates.length; i++) {
    pos[i] = (maN[i - 1] !== null && maN[i - 1] > 0) ? 1 : 0;
  }

  const stratRet = [0], benchRet = [0];
  let stratEq = initCap, benchEq = initCap;
  for (let i = 1; i < dates.length; i++) {
    const dayRet = (kmap[dates[i]].close / kmap[dates[i - 1]].close) - 1;
    stratEq *= (1 + pos[i] * dayRet);
    benchEq *= (1 + dayRet);
    stratRet.push((stratEq / initCap - 1) * 100);
    benchRet.push((benchEq / initCap - 1) * 100);
  }

  const totalDays = dates.length;
  const totalStrat = stratRet[stratRet.length - 1];
  const totalBench = benchRet[benchRet.length - 1];
  const years = totalDays / 250;
  const annStrat = years > 0 ? (Math.pow(1 + totalStrat / 100, 1 / years) - 1) * 100 : 0;
  const annBench = years > 0 ? (Math.pow(1 + totalBench / 100, 1 / years) - 1) * 100 : 0;

  function maxDD(arr) {
    let peak = arr[0], maxDd = 0;
    for (const v of arr) { peak = Math.max(peak, v); maxDd = Math.min(maxDd, v - peak); }
    return maxDd;
  }
  const ddStrat = maxDD(stratRet);
  const ddBench = maxDD(benchRet);

  let winDays = 0, holdDays = 0, trades = 0;
  for (let i = 1; i < dates.length; i++) {
    if (pos[i] === 1) {
      holdDays++;
      if (kmap[dates[i]].close > kmap[dates[i - 1]].close) winDays++;
    }
    if (pos[i] === 1 && pos[i - 1] === 0) trades++;
  }
  const winRate = holdDays ? (winDays / holdDays * 100) : 0;

  $('btStats').innerHTML = `
    <div class="stat"><div class="label">策略年化</div><div class="value ${annStrat>=0?'pos':'neg'}">${annStrat.toFixed(2)}%</div></div>
    <div class="stat"><div class="label">基准年化</div><div class="value ${annBench>=0?'pos':'neg'}">${annBench.toFixed(2)}%</div></div>
    <div class="stat"><div class="label">总收益</div><div class="value ${totalStrat>=0?'pos':'neg'}">${totalStrat.toFixed(2)}%</div></div>
    <div class="stat"><div class="label">最大回撤</div><div class="value neg">${ddStrat.toFixed(2)}%</div></div>
    <div class="stat"><div class="label">胜率</div><div class="value">${winRate.toFixed(1)}%</div></div>
    <div class="stat"><div class="label">交易次数</div><div class="value">${trades}</div></div>
  `;

  if (!btEqChart) btEqChart = echarts.init($('btEqChart'), null);
  btEqChart.setOption({
    backgroundColor: 'transparent',
    legend: { data: ['策略', '持有基准'], textStyle: { color: '#8b95a8' }, top: 5 },
    tooltip: { trigger: 'axis' },
    grid: { left: 60, right: 20, top: 35, bottom: 30 },
    xAxis: { type: 'category', data: dates, axisLabel: { color: '#8b95a8' } },
    yAxis: { type: 'value', axisLabel: { color: '#8b95a8', formatter: '{value}%' }, splitLine: { lineStyle: { color: '#1d2230' } } },
    dataZoom: [{ type: 'inside', throttle: 50 }, { type: 'slider', height: 14, bottom: 5 }],
    series: [
      { name: '策略', type: 'line', data: stratRet, smooth: true,
        lineStyle: { color: '#2d7ff9', width: 2 }, symbol: 'none',
        areaStyle: { color: 'rgba(45, 127, 249, 0.2)' } },
      { name: '持有基准', type: 'line', data: benchRet, smooth: true,
        lineStyle: { color: '#8b95a8', width: 1.5, type: 'dashed' }, symbol: 'none' },
    ],
  }, true);

  notice('bt', `回测完成:策略 ${totalStrat.toFixed(2)}% vs 基准 ${totalBench.toFixed(2)}% (${trades} 次交易)`, 'success');
}

// ───────── 自选股 ─────────
async function loadWatchlist() {
  try {
    const data = await api('/market/watchlist/get');
    const list = (data && (data.items || data.watchlist)) || (Array.isArray(data) ? data : []);
    watchlistCache = list;
    renderWatchlist(list);
    renderQuickSelect(list);
    renderHotListFallback();
  } catch (e) {
    $('sideWatchlist').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>${e.message}</div></div>`;
  }
}

function renderWatchlist(list) {
  $('watchlistCount').textContent = list.length + ' 只';
  const side = $('sideWatchlist');
  const bottom = $('watchlistContainer');
  if (!list.length) {
    const empty = '<div class="empty-state"><div class="icon">⭐</div><div>暂无自选</div><div style="font-size: 10px; margin-top: 4px;">点 ⭐ 加自选 添加</div></div>';
    side.innerHTML = empty;
    bottom.innerHTML = empty;
    return;
  }
  const html = list.map(s => {
    const symbol = s.symbol || s.code;
    const name = s.name || symbol;
    const market = s.market || 'CNStock';
    const last = s.last ?? s.price ?? null;
    const cp = s.changePercent ?? null;
    return `<div class="watchlist-item ${symbol===currentSymbol && market===currentMarket ? 'selected' : ''}" data-symbol="${symbol}" data-name="${name.replace(/"/g, '&quot;')}" data-market="${market}">
      <div class="info">
        <div class="name">${name}</div>
        <div class="code">${symbol} · ${MARKET_LABEL[market] || market}</div>
      </div>
      <div class="right">
        <div class="price">${last !== null ? last : '--'}</div>
        <div class="chg ${cp !== null ? (cp >= 0 ? 'pos' : 'neg') : ''}">${cp !== null ? (cp >= 0 ? '+' : '') + cp.toFixed(2) + '%' : ''}</div>
      </div>
      <div class="remove" data-symbol="${symbol}" data-market="${market}">×</div>
    </div>`;
  }).join('');
  side.innerHTML = html;
  bottom.innerHTML = html;
  // 事件
  [side, bottom].forEach(box => {
    box.querySelectorAll('.watchlist-item').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.classList.contains('remove')) return;
        if (el.dataset.market && el.dataset.market !== currentMarket) {
          currentMarket = el.dataset.market;
          document.querySelectorAll('.market-tabs button').forEach(b => b.classList.toggle('active', b.dataset.mkt === currentMarket));
        }
        selectStock(el.dataset.symbol, el.dataset.name);
        [side, bottom].forEach(b => b.querySelectorAll('.watchlist-item').forEach(x => x.classList.remove('selected')));
        el.classList.add('selected');
      });
    });
    box.querySelectorAll('.remove').forEach(el => {
      el.addEventListener('click', async e => {
        e.stopPropagation();
        if (!confirm('确定移除 ' + el.dataset.symbol + ' ?')) return;
        try {
          await api('/market/watchlist/remove', {
            method: 'POST',
            body: JSON.stringify({ market: el.dataset.market, symbol: el.dataset.symbol }),
          });
          loadWatchlist();
        } catch (e) { alert('移除失败: ' + e.message); }
      });
    });
  });
}

function renderQuickSelect(list) {
  const sel = $('quickSymbolSelect');
  sel.innerHTML = '<option value="">-- 选择自选标的 --</option>' +
    list.map(s => `<option value="${s.symbol}" data-market="${s.market || 'CNStock'}">${s.name || s.symbol} (${s.symbol})</option>`).join('');
  sel.onchange = () => {
    const opt = sel.selectedOptions[0];
    if (!opt || !opt.value) return;
    const mkt = opt.dataset.market || 'CNStock';
    if (mkt !== currentMarket) {
      currentMarket = mkt;
      document.querySelectorAll('.market-tabs button').forEach(b => b.classList.toggle('active', b.dataset.mkt === currentMarket));
    }
    selectStock(opt.value, opt.text.split(' (')[0]);
  };
}

async function renderHotListFallback() {
  try {
    const data = await api(`/market/symbols/hot?market=${currentMarket}&limit=10`);
    const list = Array.isArray(data) ? data : (data.items || data.symbols || []);
    const box = $('hotList');
    if (!list.length) { box.innerHTML = '<div class="empty-state"><div class="icon">📉</div><div>暂无热门</div></div>'; return; }
    box.innerHTML = list.map(s => {
      const symbol = s.symbol || s.code;
      const name = s.name || symbol;
      const last = s.last ?? s.price ?? null;
      const cp = s.changePercent ?? null;
      return `<div class="watchlist-item" data-symbol="${symbol}" data-name="${name.replace(/"/g, '&quot;')}" data-market="${currentMarket}">
        <div class="info">
          <div class="name">${name}</div>
          <div class="code">${symbol}</div>
        </div>
        <div class="right">
          <div class="price">${last !== null ? last : '--'}</div>
          <div class="chg ${cp !== null ? (cp >= 0 ? 'pos' : 'neg') : ''}">${cp !== null ? (cp >= 0 ? '+' : '') + cp.toFixed(2) + '%' : ''}</div>
        </div>
      </div>`;
    }).join('');
    box.querySelectorAll('.watchlist-item').forEach(el => {
      el.addEventListener('click', () => selectStock(el.dataset.symbol, el.dataset.name));
    });
  } catch (e) { /* 静默 */ }
}

async function addCurrentToWatchlist() {
  if (!currentSymbol) { notice('kline', '请先选标的', 'info'); return; }
  try {
    await api('/market/watchlist/add', {
      method: 'POST',
      body: JSON.stringify({ market: currentMarket, symbol: currentSymbol, name: currentStockName }),
    });
    notice('kline', '✓ 已加入自选股', 'success');
    loadWatchlist();
  } catch (e) { notice('kline', '加入失败: ' + e.message, 'error'); }
}

// ───────── 事件绑定 ─────────
$('loadKlineBtn').addEventListener('click', loadKline);
$('btBtn').addEventListener('click', runBacktest);
$('addToWatchlistBtn').addEventListener('click', addCurrentToWatchlist);
$('refreshHotBtn').addEventListener('click', () => renderHotListFallback());
$('backToQDBtn').addEventListener('click', () => { window.location.href = '/'; });
$('fullscreenBtn').addEventListener('click', () => {
  const el = $('klineChart');
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
});
['mainIndicator', 'subIndicator', 'showVolume', 'showMACD', 'crossSync'].forEach(id => {
  $(id).addEventListener('change', () => { if (cachedKlines) renderKline(cachedKlines); });
});
document.querySelectorAll('[data-tf]').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('[data-tf]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentTf = b.dataset.tf;
    if (currentSymbol) loadKline();
  });
});

window.addEventListener('resize', () => {
  [klineChart, mfLineChart, btEqChart].forEach(c => c && c.resize());
});

// ───────── 启动 ─────────
window.addEventListener('load', () => {
  // 首次进入:加载自选股侧栏 + 热门
  loadWatchlist();
  $('searchInput').placeholder = `🔍 试试 600519 / AAPL / BTCUSDT / 茅台`;
});
</script>
